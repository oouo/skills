version: 2

top_bar_system:
  id: centered-split-pill
  role: series-spine
  fields:
    left: category
    right: context
    text_form: "{category}｜{context}"
  geometry:
    position: top-center
    top_margin_percent:
      min: 2.5
      max: 3.0
    height_percent:
      min: 5.0
      max: 6.0
    width_percent:
      preferred_min: 46
      preferred_max: 64
      hard_max: 68
    shape: rounded-capsule
    left_cell: compact
    right_cell: content-driven
    divider: single-vertical
  typography:
    language: zh-CN
    family: simplified-chinese-sans
    weight: bold
    alignment: center
    mobile_preview_scale: 0.25
  decoration:
    outside_component: none
  collision_fallbacks:
    - Shorten the context without losing evidence.
    - Choose another evidence-supported keyframe with a calmer top safe zone.
    - Reserve or reconstruct a calm top-center safe zone.
    - Reduce width or type size within the geometry limits.
    - Strengthen the capsule backing while preserving the component shape.
  forbidden_fallbacks:
    - corner-tag
    - stacked-badge
    - hanging-flag
    - full-width-band
    - external-ornaments
  palette_variants:
    travel-day:
      left_background: "#2F80ED"
      right_background: "#EAF4FF"
      left_text: "#FFFFFF"
      right_text: "#1654A8"
      border: "#FFF7E8"
    travel-night:
      left_background: "#E8C56A"
      right_background: "#15100B"
      left_text: "#15100B"
      right_text: "#F5D77A"
      border: "#E8C56A"
    dog:
      left_background: "#F45472"
      right_background: "#FFE2E8"
      left_text: "#FFFFFF"
      right_text: "#4B285F"
      border: "#FFF7E8"

presets:
  travel-family:
    description: Warm, natural family-travel short-video cover.
    suitable_for:
      - family outings
      - parent-child travel
      - scenic visits
    top_bar:
      category_label: 旅行
      palette_default: travel-day
      palette_low_light: travel-night
    visual:
      primary_colors:
        - "#FF7A45"
        - "#FFC857"
      background_color: "#FFF7E8"
      accent_colors:
        - "#2F80ED"
        - "#FFFFFF"
      rendering: digital
      mood: bold
      font: display
      decorative_hints:
        - warm sunlight
        - restrained travel accents
        - clear series spine
    composition:
      subject_priority: family
      rules:
        - Preserve a warm, candid family atmosphere.
        - Keep family members, landmarks, and location evidence recognizable.
        - Use a supplied frame or reference image as the primary visual source.
        - Keep faces, hands, signs, landmarks, and the main action unobstructed.
    adapters:
      baoyu-cover-image:
        type: hero
        palette: warm
        rendering: digital
        text: text-rich
        mood: bold
        font: display

  dog-protagonist:
    description: Playful, polished dog-centered short-video cover.
    suitable_for:
      - dog stories
      - cute pet videos
      - healing or playful dog scenes
      - AI-generated or AI-enhanced dog footage
    top_bar:
      category_label: 萌宠
      palette_default: dog
    visual:
      primary_colors:
        - "#FF8FB1"
        - "#7C5CFC"
      background_color: "#FFF5FA"
      accent_colors:
        - "#FFD166"
        - "#FFFFFF"
      rendering: digital
      mood: bold
      font: display
      decorative_hints:
        - soft glow
        - sparse playful accents
        - clear series spine
    composition:
      subject_priority: dog
      rules:
        - Make the dog the unmistakable visual protagonist.
        - Preserve the dog's appearance when a reference image is available.
        - Keep the dog's face and the main action unobstructed.
        - Keep decorative elements playful but sparse.
    adapters:
      baoyu-cover-image:
        type: hero
        palette: pastel
        rendering: digital
        text: text-rich
        mood: bold
        font: display
